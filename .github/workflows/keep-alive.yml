name: Keep Alive

on:
  schedule:
    # Every 5 min. GitHub Actions cron is still best-effort, so this is only a backup.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoints
        run: |
          set -euo pipefail
          curl -fsSL --retry 2 --retry-all-errors --connect-timeout 10 --max-time 30 https://idea-wheel.onrender.com/api/health > /dev/null
          curl -fsSL --retry 2 --retry-all-errors --connect-timeout 10 --max-time 30 https://ideareels.io/api/health > /dev/null
