<svg viewBox="0 0 220 56" xmlns="http://www.w3.org/2000/svg" width="220" height="56">
  <!-- Pill background -->
  <rect x="2" y="2" width="216" height="52" rx="26" ry="26" fill="#FFE000" stroke="#111111" stroke-width="3"/>
  <!-- Bar chart icon: 3 bars -->
  <rect x="24" y="28" width="8" height="14" rx="1.5" fill="#111111"/>
  <rect x="36" y="20" width="8" height="22" rx="1.5" fill="#111111"/>
  <rect x="48" y="24" width="8" height="18" rx="1.5" fill="#111111"/>
  <!-- Crown / asterisk above middle bar -->
  <g fill="#111111">
    <!-- 4-point star / sparkle above middle bar, centred at x=40 y=16 -->
    <polygon points="40,10 41.4,14.6 46,13 41.4,17.4 43,22 40,18.8 37,22 38.6,17.4 34,13 38.6,14.6" />
  </g>
  <!-- IDEAREELS text -->
